<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>May &amp; Jay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14111a; --paper: #f3ede3; --paper-dim: #a89d9a;
    --may: #d97a92; --jay: #6fa998; --danger: #c25450;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 30% 20%, rgba(217,122,146,0.12), transparent 55%),
                radial-gradient(circle at 75% 75%, rgba(111,169,152,0.12), transparent 55%),
                var(--ink);
    color: var(--paper);
    font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 360px;
    background: #1e1a24;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 36px 28px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.55);
    text-align: center;
  }
  .dots { display: inline-flex; gap: -6px; margin-bottom: 14px; }
  .dots span { width: 16px; height: 16px; border-radius: 50%; display: inline-block; }
  .dots .m { background: var(--may); margin-right: -6px; }
  .dots .j { background: var(--jay); mix-blend-mode: screen; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 1.6rem; margin-bottom: 6px; }
  p.sub { color: var(--paper-dim); font-size: 0.9rem; margin-bottom: 22px; }
  input[type="password"] {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
    background: #14111a; color: var(--paper); font-family: var(--font-body); font-size: 1rem;
    margin-bottom: 12px; outline: none;
  }
  input[type="password"]:focus { border-color: var(--may); }
  button {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: none;
    background: var(--may); color: #14111a; font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: opacity 0.2s ease;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.6; cursor: default; }
  .error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; min-height: 1.1em; }
</style>
</head>
<body>
  <div class="card">
    <div class="dots"><span class="m"></span><span class="j"></span></div>
    <h1>May &amp; Jay</h1>
    <p class="sub">Enter the password to open the library.</p>
    <form id="loginForm" autocomplete="off">
      <input type="password" id="password" placeholder="Password" autofocus required>
      <button type="submit" id="submitBtn">Enter</button>
      <div class="error" id="errorMsg"></div>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Checking…';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Wrong password.';
          btn.disabled = false;
          btn.textContent = 'Enter';
        }
      } catch (e2) {
        err.textContent = 'Something went wrong. Try again.';
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    });
  </script>
</body>
</html>
